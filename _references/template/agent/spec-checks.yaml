  # - id: proj-004
  #   description: "No direct DB access from API routes"
  #   type: "grep_absent"
  #   target: "backend/app/api/**/*.py"
  #   pattern: "db\\.session\\.(add|delete|commit)"
  #   severity: "error"
  #   message: "Direct DB access in API route -- use the service layer"
