# Agent-facing permission matrix -- structured version of conceptual-design-as-is.md
# Generated by /design from project-specific inputs
# Used by check_spec_conformance.py for permission verification
#
# How to use: Define roles and their permissions. Each permission maps
# a resource + action to allowed roles and optional conditions.

version: 1

roles:
  - name: "{{role_name}}"
    description: "{{role description}}"
    inherits: null  # or another role name for role hierarchy

  - name: "{{admin_role}}"
    description: "{{e.g., Full system access}}"
    inherits: null

permissions:
  - resource: "{{entity_or_feature}}"
    actions:
      - action: "create"
        allowed_roles: ["{{role}}"]
        conditions: null  # or "{{e.g., own_records_only}}"

      - action: "read"
        allowed_roles: ["{{role}}", "{{role}}"]
        conditions: null

      - action: "update"
        allowed_roles: ["{{role}}"]
        conditions: "{{e.g., own_records_only}}"

      - action: "delete"
        allowed_roles: ["{{admin_role}}"]
        conditions: null
