# Agent-facing entity registry -- structured version of conceptual-design-as-is.md
# Generated by /design from project-specific inputs
# Used by check_spec_conformance.py for entity validation
#
# How to use: Define each entity with its table, fields, relationships,
# and permission matrix. This serves as the machine-parseable contract
# that agents use to verify implementations match the design.

version: 1

entities:
  - name: "{{EntityName}}"
    table: "{{table_name}}"
    soft_delete: false  # true if entity uses soft delete pattern
    fields:
      - name: "id"
        type: "integer"
        nullable: false
        primary_key: true
        constraints: []

      - name: "{{field_name}}"
        type: "{{string|integer|boolean|datetime|text|float|json}}"
        nullable: false
        constraints:
          - "{{e.g., max_length: 255}}"
          - "{{e.g., unique: true}}"

      - name: "created_at"
        type: "datetime"
        nullable: false
        constraints:
          - "server_default: now()"

    relationships:
      - target: "{{OtherEntity}}"
        type: "{{many-to-one|one-to-many|many-to-many}}"
        fk: "{{foreign_key_column}}"
        cascade: "{{all,delete-orphan|save-update,merge|none}}"

    permissions:
      create: ["{{role}}"]
      read: ["{{role}}", "{{role}}"]
      update: ["{{role}}"]
      delete: ["{{role}}"]
