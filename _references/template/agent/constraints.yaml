# Agent-facing constraints -- machine-parseable version of constitution.md and constraints.md
# Generated by /design from project-specific inputs
# Used by check_spec_conformance.py for automated validation
#
# How to use: Fill in the constraints below based on your project's
# constitution.md and conventions. Each constraint has an id, rule,
# scope (backend|frontend|all), and a verify method describing how
# to check compliance.

version: 1

constraints:
  technical:
    - id: tech-001
      rule: "{{e.g., All data mutations go through the service layer}}"
      scope: "backend"
      verify: "{{e.g., grep_absent: direct model .save() calls in API route files}}"

    - id: tech-002
      rule: "{{e.g., Every API endpoint returns a consistent response envelope}}"
      scope: "backend"
      verify: "{{e.g., grep_match: response_builder usage in all route files}}"

    - id: tech-003
      rule: "{{e.g., No raw SQL outside migration files}}"
      scope: "backend"
      verify: "{{e.g., grep_absent: db.engine.execute or text() in non-migration files}}"

  quality:
    - id: qual-001
      rule: "{{e.g., All user-facing text must be internationalized}}"
      scope: "frontend"
      verify: "{{e.g., grep_absent: hardcoded user-facing strings in component files}}"

    - id: qual-002
      rule: "{{e.g., No code ships without tests covering the primary path}}"
      scope: "all"
      verify: "{{e.g., file_exists: test file for each source module}}"

  security:
    - id: sec-001
      rule: "{{e.g., All endpoints require authentication unless explicitly public}}"
      scope: "backend"
      verify: "{{e.g., grep_match: @login_required or @public_endpoint in all route files}}"

    - id: sec-002
      rule: "{{e.g., No secrets in source code}}"
      scope: "all"
      verify: "{{e.g., grep_absent: hardcoded API keys, passwords, tokens in source files}}"

    - id: sec-003
      rule: "{{e.g., PII fields must be encrypted at rest}}"
      scope: "backend"
      verify: "{{e.g., model_field: encrypted=True on PII columns}}"
